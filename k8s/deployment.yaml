apiVersion: apps/v1
kind: Deployment
metadata:
  name: lingflow
  labels:
    app: lingflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lingflow
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lingflow
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4030"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: lingflow
          image: lingflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: websocket
              containerPort: 4030
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lingflow-config
            - secretRef:
                name: lingflow-secrets
          env:
            - name: MODE
              value: "production"
            - name: WSS_ADDR
              value: ":4030"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: 4030
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4030
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 60