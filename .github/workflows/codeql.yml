# ============================================================================
# LingFlow - GitHub Actions CI/CD 流水线配置
# ============================================================================
# 模块名称: ling_flow
# 语言: Go 1.26.1 + Vue 3 (Bun + Vite)
# 部署目标: AWS Lambda
# ============================================================================

name: 'LingFlow CI/CD'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '16 14 * * 2'

env:
  GO_VERSION: '1.26.1'
  BUN_VERSION: '1.2'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

# ============================================================================
# 代码质量阶段
# ============================================================================
jobs:
  go-format:
    name: Go 代码格式检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 检查 Go 代码格式
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "以下文件未格式化："
            echo "$UNFORMATTED"
            exit 1
          fi

  go-vet:
    name: Go 静态分析
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 运行 Go 静态分析
        run: go vet ./...

  # ============================================================================
  # 测试阶段
  # ============================================================================
  go-test:
    name: Go 单元测试
    runs-on: ubuntu-latest
    needs: [go-format, go-vet]
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 运行单元测试
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: 输出覆盖率报告
        run: go tool cover -func=coverage.out

      - name: 上传覆盖率产物
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ============================================================================
  # 构建阶段
  # ============================================================================
  go-build:
    name: 构建 Go 后端
    runs-on: ubuntu-latest
    needs: [go-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 构建二进制文件
        run: |
          mkdir -p build
          go build -v -ldflags "-s -w" -o build/LingFlow .
          ls -lh build/LingFlow

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: lingflow-binary
          path: build/LingFlow
          retention-days: 7

  go-build-lambda:
    name: 构建 Lambda 部署包
    runs-on: ubuntu-latest
    needs: [go-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 交叉编译 Lambda 二进制
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -v -ldflags "-s -w" -o build/bootstrap .

      - name: 打包 Lambda 部署文件
        run: |
          cd build && zip -j lambda.zip bootstrap
          ls -lh lambda.zip

      - name: 上传 Lambda 部署包
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: build/lambda.zip
          retention-days: 7

  frontend-build:
    name: 构建前端静态资源
    runs-on: ubuntu-latest
    needs: [go-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置 Bun 环境
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 安装前端依赖
        working-directory: demo
        run: bun install --frozen-lockfile

      - name: 构建前端项目
        working-directory: demo
        run: bun run build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: demo/dist/
          retention-days: 7

  # ============================================================================
  # 安全扫描阶段
  # ============================================================================
  codeql-analysis:
    name: CodeQL 安全分析 (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: [go-format, go-vet]
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: 执行手动构建步骤
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo '如果你对一种或多种语言使用了 "manual" 构建模式，' \
            '请将此处替换为构建代码的命令，例如：'
          echo '  make bootstrap'
          echo '  make release'
          exit 1

      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'


